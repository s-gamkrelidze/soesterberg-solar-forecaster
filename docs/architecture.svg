<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 600" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ar--w" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6b7280"/>
    </marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#9333ea"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="590" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#1f2a44">Soesterberg Solar PV Forecaster — Architecture</text>

  <!-- ===== TRAINING BAND ===== -->
  <rect x="20" y="70" width="1140" height="130" rx="10" fill="#eaf2fe"/>
  <text x="34" y="62" font-size="14" font-weight="700" fill="#2f5fbf">① TRAINING  ·  offline (run once / periodically)</text>

  <!-- training boxes (y=100 h=64 w=150, gap 35) -->
  <g stroke="#5b8def" stroke-width="1.5">
    <rect x="40"  y="100" width="150" height="64" rx="8" fill="#ffffff"/>
    <rect x="225" y="100" width="150" height="64" rx="8" fill="#ffffff"/>
    <rect x="410" y="100" width="150" height="64" rx="8" fill="#ffffff"/>
    <rect x="595" y="100" width="150" height="64" rx="8" fill="#ffffff"/>
    <rect x="780" y="100" width="150" height="64" rx="8" fill="#ffffff"/>
    <rect x="965" y="100" width="150" height="64" rx="8" fill="#ffffff"/>
  </g>
  <g font-size="12" fill="#1f2a44" text-anchor="middle">
    <text x="115" y="128" font-weight="700">Data sources</text>
    <text x="115" y="144" font-size="11">ID003 · KNMI · ERA5</text>

    <text x="300" y="136" font-weight="700">Ingestion</text>

    <text x="485" y="128" font-weight="700">Clean +</text>
    <text x="485" y="144">feature eng.</text>

    <text x="670" y="128" font-weight="700">Training</text>
    <text x="670" y="144">dataset CSV</text>

    <text x="855" y="120" font-weight="700">Train</text>
    <text x="855" y="135" font-size="11">LGBM q05/q50/q95</text>
    <text x="855" y="150" font-size="11">+ conformal</text>

    <text x="1040" y="128" font-weight="700">Models</text>
    <text x="1040" y="144" font-size="11">(.pkl)</text>
  </g>
  <!-- training arrows -->
  <g stroke="#6b7280" stroke-width="1.6" fill="none" marker-end="url(#ar--w)">
    <line x1="190" y1="132" x2="223" y2="132"/>
    <line x1="375" y1="132" x2="408" y2="132"/>
    <line x1="560" y1="132" x2="593" y2="132"/>
    <line x1="745" y1="132" x2="778" y2="132"/>
    <line x1="930" y1="132" x2="963" y2="132"/>
  </g>

  <!-- ===== INFERENCE BAND ===== -->
  <rect x="20" y="250" width="1140" height="320" rx="10" fill="#eafaf0"/>
  <text x="34" y="242" font-size="14" font-weight="700" fill="#2f8f57">② INFERENCE  ·  daily pipeline (run_results_pipeline.py)</text>

  <!-- weather inputs -->
  <g stroke="#46b06a" stroke-width="1.5">
    <rect x="40" y="300" width="150" height="56" rx="8" fill="#ffffff"/>
    <rect x="40" y="440" width="150" height="56" rx="8" fill="#ffffff"/>
  </g>
  <g font-size="12" fill="#1f2a44" text-anchor="middle">
    <text x="115" y="324" font-weight="700">Open-Meteo</text>
    <text x="115" y="340" font-size="11">NWP (live)</text>
    <text x="115" y="464" font-weight="700">ECMWF SEAS5</text>
    <text x="115" y="480" font-size="11">+ 5-yr climatology</text>
  </g>

  <!-- forecasters -->
  <g stroke="#46b06a" stroke-width="1.5">
    <rect x="300" y="300" width="190" height="56" rx="8" fill="#ffffff"/>
    <rect x="300" y="440" width="190" height="56" rx="8" fill="#ffffff"/>
  </g>
  <g font-size="12" fill="#1f2a44" text-anchor="middle">
    <text x="395" y="318" font-weight="700">forecast_pv</text>
    <text x="395" y="332" font-size="11">pvlib physics →</text>
    <text x="395" y="346" font-size="11">quantile → conformal</text>
    <text x="395" y="464" font-weight="700">forecast_climate</text>
    <text x="395" y="480" font-size="11">physics + Model-2 scale</text>
  </g>

  <!-- forecast outputs -->
  <g stroke="#46b06a" stroke-width="1.5">
    <rect x="560" y="300" width="140" height="56" rx="8" fill="#ffffff"/>
    <rect x="560" y="440" width="140" height="56" rx="8" fill="#ffffff"/>
  </g>
  <g font-size="12" fill="#1f2a44" text-anchor="middle">
    <text x="630" y="324" font-weight="700">14-day forecast</text>
    <text x="630" y="340" font-size="11">(15-min)</text>
    <text x="630" y="464" font-weight="700">Seasonal forecast</text>
    <text x="630" y="480" font-size="11">(weekly + daily)</text>
  </g>

  <!-- analysis merge -->
  <rect x="760" y="362" width="220" height="92" rx="8" fill="#ffffff" stroke="#e0883b" stroke-width="1.6"/>
  <g font-size="12" fill="#1f2a44" text-anchor="middle">
    <text x="870" y="392" font-weight="700">Analysis</text>
    <text x="870" y="410" font-size="11">optimize · alerts · yield</text>
    <text x="870" y="426" font-size="11">reports · SHAP · briefing</text>
  </g>

  <!-- outputs -->
  <rect x="1010" y="362" width="150" height="92" rx="8" fill="#ffffff" stroke="#e0883b" stroke-width="1.6"/>
  <g font-size="12" fill="#1f2a44" text-anchor="middle">
    <text x="1085" y="396" font-weight="700">Outputs +</text>
    <text x="1085" y="412">Streamlit</text>
    <text x="1085" y="428">dashboard</text>
  </g>

  <!-- inference arrows -->
  <g stroke="#6b7280" stroke-width="1.6" fill="none" marker-end="url(#ar--w)">
    <line x1="190" y1="328" x2="298" y2="328"/>
    <line x1="190" y1="468" x2="298" y2="468"/>
    <line x1="490" y1="328" x2="558" y2="328"/>
    <line x1="490" y1="468" x2="558" y2="468"/>
    <line x1="700" y1="328" x2="775" y2="386"/>
    <line x1="700" y1="468" x2="775" y2="430"/>
    <line x1="980" y1="408" x2="1008" y2="408"/>
  </g>

  <!-- models bus (dashed) -->
  <g stroke="#9333ea" stroke-width="1.6" fill="none" stroke-dasharray="5 4">
    <polyline points="1040,164 1040,230 270,230"/>
    <line x1="395" y1="230" x2="395" y2="298" marker-end="url(#arr-purple)"/>
    <polyline points="270,230 270,468 298,468" marker-end="url(#arr-purple)"/>
  </g>
  <text x="655" y="222" text-anchor="middle" font-size="11" fill="#9333ea" font-weight="600">loads trained models (.pkl + conformal)</text>
</svg>
